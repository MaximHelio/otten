<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Otten Group - Quantum Computing Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(20, 20, 30, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 255, 255, 0.1),
                        0 0 100px rgba(138, 43, 226, 0.05);
            overflow: hidden;
            border: 1px solid rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: 2px solid rgba(0, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .bot-avatar {
            width: 50px;
            height: 50px;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .header-text {
            position: relative;
            z-index: 1;
        }

        .header h1 {
            color: #00ffff;
            font-size: 1.5em;
            margin-bottom: 3px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            font-weight: 600;
        }

        .header p {
            color: #b0b0b0;
            font-size: 0.85em;
            font-weight: 400;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            animation: statusBlink 2s ease-in-out infinite;
        }

        @keyframes statusBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: rgba(10, 10, 15, 0.5);
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00ffff 0%, #8a2be2 100%);
            border-radius: 10px;
        }

        .message-wrapper {
            margin-bottom: 20px;
            animation: slideIn 0.4s ease-out;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            flex-shrink: 0;
        }

        .bot-message-wrapper {
            flex-direction: row;
        }

        .user-message-wrapper {
            flex-direction: row-reverse;
        }

        .bot-message {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(138, 43, 226, 0.1) 100%);
            padding: 15px 18px;
            border-radius: 18px 18px 18px 5px;
            border-left: 3px solid #00ffff;
            color: #e0e0e0;
            line-height: 1.7;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.1);
            max-width: 75%;
            font-size: 0.95em;
        }

        .user-message {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.2) 0%, rgba(0, 255, 255, 0.1) 100%);
            padding: 12px 16px;
            border-radius: 18px 18px 5px 18px;
            border-right: 3px solid #8a2be2;
            color: #fff;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.15);
            max-width: 70%;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 18px;
            max-width: 80px;
        }

        .typing-indicator.active {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #00ffff;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .question-suggestions {
            margin-top: 20px;
            animation: slideIn 0.4s ease-out;
        }

        .suggestions-header {
            color: #00ffff;
            font-size: 0.85em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.9;
            font-weight: 500;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .suggestion-button {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.08) 0%, rgba(138, 43, 226, 0.08) 100%);
            border: 1px solid rgba(0, 255, 255, 0.25);
            color: #00ffff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85em;
            text-align: left;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }

        .suggestion-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .suggestion-button:hover::before {
            left: 100%;
        }

        .suggestion-button:hover {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15) 0%, rgba(138, 43, 226, 0.15) 100%);
            border-color: #00ffff;
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        }

        .suggestion-button:active {
            transform: translateX(3px);
        }

        .suggestion-icon {
            font-size: 1.1em;
            flex-shrink: 0;
        }

        .footer {
            padding: 12px;
            text-align: center;
            background: rgba(10, 10, 15, 0.5);
            border-top: 1px solid rgba(0, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75em;
            font-weight: 400;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-qubit {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
        }

        .welcome-message h2 {
            color: #00ffff;
            margin-bottom: 12px;
            font-size: 1.6em;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            font-weight: 600;
        }

        .welcome-message p {
            color: #999;
            font-size: 0.95em;
            line-height: 1.6;
            font-weight: 400;
        }

        strong {
            color: #00ffff;
            font-weight: 600;
        }

        a {
            color: #00ffff;
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        a:hover {
            border-bottom-color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* Mobile Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                max-height: 95vh;
                border-radius: 15px;
            }

            .header {
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 1.3em;
            }

            .header p {
                font-size: 0.75em;
            }

            .bot-avatar {
                width: 40px;
                height: 40px;
            }

            .chat-container {
                padding: 15px;
            }

            .message-avatar {
                width: 28px;
                height: 28px;
            }

            .bot-message, .user-message {
                max-width: 85%;
                font-size: 0.9em;
                padding: 12px 15px;
            }

            .welcome-qubit {
                width: 100px;
                height: 100px;
            }

            .welcome-message h2 {
                font-size: 1.3em;
            }

            .welcome-message p {
                font-size: 0.85em;
            }

            .suggestions-grid {
                grid-template-columns: 1fr;
            }

            .suggestion-button {
                font-size: 0.8em;
            }

            .footer {
                font-size: 0.7em;
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.1em;
            }

            .header p {
                font-size: 0.7em;
            }

            .bot-avatar {
                width: 35px;
                height: 35px;
            }

            .message-avatar {
                width: 25px;
                height: 25px;
            }

            .bot-message, .user-message {
                font-size: 0.85em;
                padding: 10px 12px;
            }

            .welcome-qubit {
                width: 80px;
                height: 80px;
            }

            .welcome-message h2 {
                font-size: 1.1em;
            }

            .welcome-message p {
                font-size: 0.8em;
            }

            .suggestion-button {
                font-size: 0.75em;
                padding: 9px 12px;
            }
        }

        @media (max-width: 360px) {
            .chat-container {
                padding: 12px;
            }

            .bot-message, .user-message {
                font-size: 0.8em;
                padding: 8px 10px;
            }

            .suggestion-button {
                font-size: 0.7em;
                padding: 8px 10px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                max-height: 98vh;
            }

            .header {
                padding: 10px 20px;
            }

            .header h1 {
                font-size: 1.2em;
            }

            .bot-avatar {
                width: 35px;
                height: 35px;
            }

            .welcome-message {
                padding: 20px;
            }

            .welcome-qubit {
                width: 60px;
                height: 60px;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <svg class="bot-avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="35" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.4">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="8s" repeatCount="indefinite"/>
                </circle>
                <circle cx="50" cy="50" r="22" fill="url(#qubitGradient)"/>
                <defs>
                    <linearGradient id="qubitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.8" />
                        <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:0.8" />
                    </linearGradient>
                </defs>
                <circle cx="43" cy="47" r="3" fill="#000"/>
                <circle cx="57" cy="47" r="3" fill="#000"/>
                <path d="M 43 55 Q 50 60 57 55" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
                <circle cx="85" cy="50" r="4" fill="#ff00ff">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="3s" repeatCount="indefinite"/>
                </circle>
                <circle cx="15" cy="50" r="4" fill="#00ffff">
                    <animateTransform attributeName="transform" type="rotate" from="180 50 50" to="540 50 50" dur="3s" repeatCount="indefinite"/>
                </circle>
            </svg>
            <div class="header-text">
                <h1>Qubit Assistant</h1>
                <p><span class="status-indicator"></span>Otten Group @ UW–Madison</p>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <svg class="welcome-qubit" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.3">
                        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="50" cy="50" r="28" fill="none" stroke="#8a2be2" stroke-width="1.5" opacity="0.3">
                        <animateTransform attributeName="transform" type="rotate" from="180 50 50" to="-180 50 50" dur="10s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="50" cy="50" r="25" fill="url(#welcomeGradient)"/>
                    <defs>
                        <linearGradient id="welcomeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.9" />
                            <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:0.9" />
                        </linearGradient>
                    </defs>
                    <circle cx="42" cy="45" r="3.5" fill="#000"/>
                    <circle cx="58" cy="45" r="3.5" fill="#000"/>
                    <path d="M 42 54 Q 50 60 58 54" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <circle cx="25" cy="25" r="2" fill="#00ffff" opacity="0.8">
                        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="75" cy="30" r="2" fill="#ff00ff" opacity="0.8">
                        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="70" cy="75" r="2" fill="#00ffff" opacity="0.8">
                        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
                    </circle>
                </svg>
                <h2>Hi! I'm Qubit 👋</h2>
                <p>Your friendly quantum guide to the Otten Group!</p>
            </div>

            <!-- Initial question suggestions -->
            <div class="question-suggestions" id="questionList">
                <div class="suggestions-header">💬 What would you like to know?</div>
                <div class="suggestions-grid">
                    <button class="suggestion-button" onclick="showAnswer(1)">
                        <span class="suggestion-icon">👋</span>
                        <span>About Otten Group</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(2)">
                        <span class="suggestion-icon">⚛️</span>
                        <span>Quantum Algorithms</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(3)">
                        <span class="suggestion-icon">🌌</span>
                        <span>Quantum Simulations</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(4)">
                        <span class="suggestion-icon">🔍</span>
                        <span>QCVV</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(5)">
                        <span class="suggestion-icon">🛡️</span>
                        <span>Error Correction</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(6)">
                        <span class="suggestion-icon">🤝</span>
                        <span>Collaborations</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(7)">
                        <span class="suggestion-icon">🎓</span>
                        <span>Lab Potential</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(8)">
                        <span class="suggestion-icon">📚</span>
                        <span>Still Not Sure</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(9)">
                        <span class="suggestion-icon">🚀</span>
                        <span>Getting Started</span>
                    </button>
                    <button class="suggestion-button" onclick="showAnswer(10)">
                        <span class="suggestion-icon">💰</span>
                        <span>Funding Status</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2026 h.koh
        </div>
    </div>

    <script>
        const faqData = {
            1: {
                question: "Hi, nice to meet you! I'm curious about the Otten Group.",
                answer: "We are a <strong>theoretical quantum information science group</strong> at the University of Wisconsin–Madison, working toward making useful-scale quantum computers, quantum networks, and quantum sensors a reality.<br><br>We focus on bridging the gap between <strong>quantum algorithms and real hardware</strong>—developing methods that work not just on paper, but on actual quantum devices. Our research spans quantum chemistry, error correction, system simulations, and practical benchmarking.<br><br>Want to learn more? Check out our <a href='https://scholar.google.com/citations?hl=en&user=iMbZ9pUAAAAJ&view_op=list_works&sortby=pubdate' target='_blank'>latest publications</a>.",
            },
            2: {
                question: "What kind of quantum algorithms do you develop?",
                answer: "We develop, analyze, and test quantum algorithms across several frontiers:<br><br>• <strong>Quantum Chemistry</strong>: Variational quantum eigensolvers (VQE) with localized active space methods, coupled cluster techniques, and quantum kernels for molecular simulations<br>• <strong>Quantum Machine Learning</strong>: Hardware-efficient quantum kernels using multimode bulk acoustic resonators, benchmarking across diverse datasets<br>• <strong>Quantum Optimal Control</strong>: Physics-informed neural networks for gate design and optimization<br><br>Recent work includes ground state energy estimation, first ionization potential calculations for transition metals (Cr, Mo, W), and developing polynomial-scaling methods that make utility-scale applications feasible.",
            },
            3: {
                question: "How do you simulate open quantum systems?",
                answer: "We use <strong>advanced numerical methods and high-performance computing</strong> to understand how real quantum systems behave in noisy environments:<br><br>• Simulating large-scale <strong>neutral-atom quantum systems</strong> (1D chains)<br>• Modeling <strong>noise, decoherence, and performance limits</strong> across hardware platforms including Rydberg atoms, semiconductor qubits, and superconducting circuits<br>• Developing <strong>Gottesman-Kitaev-Preskill (GKP) codes</strong> with energy-scaled zero-noise extrapolation<br>• Simulating <strong>fusion atomic processes</strong> relevant to plasma physics applications<br><br>This work connects directly to experimental systems—ensuring our theoretical predictions match real-world quantum device behavior.",
            },
            4: {
                question: "What is QCVV and why does it matter?",
                answer: "<strong>QCVV (Characterization, Verification, and Validation)</strong> is how we measure and understand quantum system performance—essentially the 'quality control' for quantum computers.<br><br>Our contributions include:<br>• <strong>QB Ground State Energy Estimation Benchmark</strong>—standardized metrics for comparing quantum chemistry algorithms across platforms<br>• Practical <strong>error-mitigation strategies</strong> that scale to real devices<br>• Understanding how to extract reliable results from <strong>noisy intermediate-scale quantum (NISQ)</strong> processors<br><br>Without rigorous QCVV, it's impossible to know if your quantum algorithm is actually outperforming classical methods or just producing noise. We develop the tools that make quantum computing results trustworthy.",
            },
            5: {
                question: "How do you approach error correction?",
                answer: "Error correction is central to achieving <strong>fault-tolerant quantum computing</strong>. Our research tackles both the theory and practical implementation:<br><br>• <strong>Quantum LDPC codes</strong>: Fast implementation using optimized Rydberg gates with realistic gate architectures<br>• <strong>Full-stack co-design</strong>: Estimating resources for utility-scale applications by integrating algorithms with error-correction frameworks<br>• <strong>Cost mitigation</strong>: Developing techniques like nonunitary variational methods with the localized active space approach to reduce quantum resource requirements<br><br>Recent work shows how to build quantum supercomputers by addressing scaling challenges at every layer—from individual qubits to system architecture. We identify the <strong>true bottlenecks</strong> in realistic fault-tolerant implementations.",
            },
            6: {
                question: "Do you collaborate with other research groups?",
                answer: "Absolutely! Our work bridges <strong>theory and experiment</strong> through extensive collaborations:<br><br>• <strong>Experimental groups</strong>: Working directly with Rydberg atom platforms, neutral atom systems, and quantum hardware developers<br>• <strong>Industry partnerships</strong>: Contributing to quantum-centric supercomputing initiatives and modular quantum processor architectures<br>• <strong>Multi-institutional projects</strong>: Collaborating on benchmarking standards, materials science applications, and strongly correlated metal-protein interactions (Quanta-Bind project)<br><br>We're part of the broader <strong>quantum information ecosystem at UW–Madison</strong>, which includes experimental physics, chemistry, and materials science groups. This ensures our theoretical work has immediate relevance to cutting-edge experimental systems.",
            },
            7: {
                question: "So... is this lab actually promising?",
                answer: "<strong>Short answer: yes—and UW–Madison is a big part of why.</strong><br><br>The group actively publishes in top venues like <strong>J. Chem. Theory Comput.</strong> and <strong>Phys. Rev. A</strong>, contributing to major initiatives in quantum supercomputing and fault-tolerant architecture design.<br><br>UW–Madison provides an ideal environment with:<br>• Strong quantum science ecosystem<br>• High-performance computing infrastructure<br>• Interdisciplinary collaborations across physics, chemistry, and engineering<br><br>The group tackles problems that matter—not just academically interesting toy models, but challenges that determine whether quantum computers will actually be useful at scale.",
            },
            8: {
                question: "I'm  still not sure if this is for me",
                answer: "Absolutely! You can explore quantum computing through several courses at UW–Madison before committing:<br><br>• <strong>CHEM 675</strong> - Introduction to Quantum Chemistry<br>• <strong>PHYSICS 709</strong> - Introduction to Quantum Computing<br>• <strong>PHYSICS 731</strong> - Quantum Mechanics<br>• <strong>PHYSICS 765</strong> - Quantum Algorithms and Error Correction<br>• <strong>PHYSICS 779</strong> - Advanced Quantum Computing<br><br>These courses give you hands-on exposure to:<br>• Quantum algorithm design and analysis<br>• Error correction theory<br>• Computational quantum chemistry<br>• Practical implementation challenges<br><br>Think of them as a <strong>low-risk way to see if this field—and this group—fits you</strong>. Many successful group members started by taking one of these courses first.",
            },
            9: {
                question: "I'm interested! How do I get started?",
                answer: "We're glad you're interested! Here's how to get started:<br><br><strong>📋 Current Opportunities:</strong><br>Check out available positions and application details at:<br><a href='https://otten.physics.wisc.edu/jobs/' target='_blank'>https://otten.physics.wisc.edu/jobs/</a><br><br><strong>🎯 What we're looking for:</strong><br>If you're <strong>curious, ambitious, and enjoy tackling hard problems</strong> that don't yet have clear answers—problems at the intersection of quantum algorithms, error correction, and real hardware—we'd love to talk.<br><br><strong>💡 Research areas you might explore:</strong><br>• Quantum algorithm development for chemistry and machine learning<br>• Error correction and fault-tolerant quantum computing<br>• Quantum system simulations and benchmarking<br>• Optimal control and gate design<br><br><strong>Welcome to Wisconsin!</strong> 🎓",
            },
            10: {
                question: "How is the funding status here?",

        const questionLabels = {
            1: { icon: "👋", text: "About Otten Group" },

        const qubitSVG = `
            <svg class="message-avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="35" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.4">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="8s" repeatCount="indefinite"/>
                </circle>
                <circle cx="50" cy="50" r="22" fill="url(#msgQubitGradient)"/>
                <defs>
                    <linearGradient id="msgQubitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.8" />
                        <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:0.8" />

                <circle cx="85" cy="50" r="4" fill="#ff00ff">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="3s" repeatCount="indefinite"/>
                </circle>
                <circle cx="15" cy="50" r="4" fill="#00ffff">
                    <animateTransform attributeName="transform" type="rotate" from="180 50 50" to="540 50 50" dur="3s" repeatCount="indefinite"/>

        const userSVG = `
            <svg class="message-avatar" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="30" fill="url(#userGradient)"/>
                <defs>
                    <linearGradient id="userGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#8a2be2;stop-opacity:0.8" />
                        <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0.8" />
                    </linearGradient>
                </defs>
                <text x="50" y="65" font-size="40" text-anchor="middle" fill="#fff">👤</text>
            </svg>
        `;

        function showAllQuestions() {
            const chatContainer = document.getElementById('chatContainer');
            
            // Check if question list already exists
            if (document.getElementById('questionList')) {
                return;
            }
            
            const suggestionsDiv = document.createElement('div');
            suggestionsDiv.className = 'question-suggestions';
            suggestionsDiv.id = 'questionList';
            
            let buttonsHTML = '';
            for (let i = 1; i <= 10; i++) {
                const label = questionLabels[i];
                buttonsHTML += `
                    <button class="suggestion-button" onclick="showAnswer(${i})">
                        <span class="suggestion-icon">${label.icon}</span>
                        <span>${label.text}</span>
                    </button>
                `;
            }
            
            suggestionsDiv.innerHTML = `
                <div class="suggestions-header">💬 What would you like to know?</div>
                <div class="suggestions-grid">
                    ${buttonsHTML}
                </div>
            `;
            
            chatContainer.appendChild(suggestionsDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showAnswer(id) {
            const chatContainer = document.getElementById('chatContainer');
            const data = faqData[id];
            
            // Remove welcome message if it exists
            const welcome = chatContainer.querySelector('.welcome-message');
            if (welcome) welcome.remove();
            
            // Remove existing question list
            const existingList = document.getElementById('questionList');
            if (existingList) existingList.remove();
            
            // Add user message (question) - RIGHT SIDE
            const userWrapper = document.createElement('div');
            userWrapper.className = 'message-wrapper user-message-wrapper';
            userWrapper.innerHTML = `
                <div class="user-message">${data.question}</div>
                ${userSVG}
            `;
            chatContainer.appendChild(userWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // Show typing indicator on LEFT SIDE
            setTimeout(() => {
                const typingWrapper = document.createElement('div');
                typingWrapper.className = 'message-wrapper bot-message-wrapper';
                typingWrapper.innerHTML = `
                    ${qubitSVG}
                    <div class="typing-indicator active">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                chatContainer.appendChild(typingWrapper);
                chatContainer.scrollTop = chatContainer.scrollHeight;
                
                // Add bot message (answer) - LEFT SIDE
                setTimeout(() => {
                    typingWrapper.remove();
                    
                    const botWrapper = document.createElement('div');
                    botWrapper.className = 'message-wrapper bot-message-wrapper';
                    botWrapper.innerHTML = `
                        ${qubitSVG}
                        <div class="bot-message">${data.answer}</div>
                    `;
                    chatContainer.appendChild(botWrapper);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    
                    // Show all questions again
                    setTimeout(() => {
                        showAllQuestions();
                    }, 200);
                }, 800);
            }, 300);
        }
    </script>
